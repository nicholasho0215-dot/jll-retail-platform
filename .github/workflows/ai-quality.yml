name: AI quality audit

on:
  schedule:
    - cron: "0 21 * * 0" # weekly, Monday 05:00 SGT
  workflow_dispatch:
  push: # TEMP: verification run before merge — remove
    branches: ["claude/jll-retail-agents-qa-oe26mu"]

jobs:
  grounding:
    name: Assistant grounding & feed relevance (LLM judge)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx vitest run src/test/aiQuality.test.ts
        env:
          AI_QUALITY: "1"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          ACCESS_CODE: ${{ secrets.ACCESS_CODE }}

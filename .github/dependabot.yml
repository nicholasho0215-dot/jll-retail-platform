version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Singapore
    open-pull-requests-limit: 5
    # Major versions of the core build chain are deliberate migrations, not
    # auto-bumps — the Vite 8 major in the first dev-tooling batch broke the
    # production build.
    ignore:
      - dependency-name: vite
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
      - dependency-name: tailwindcss
        update-types: ["version-update:semver-major"]
    groups:
      radix:
        patterns: ["@radix-ui/*"]
      dev-tooling:
        dependency-type: development

  - package-ecosystem: pip
    directory: /server
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Singapore
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
